<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/8d9931e63d.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>contact</title>
</head>
<body>
    <header>
        <!-- Navbar -->
        <nav>
            <a href="#" class="logo display">YS</a>
            <ul>
                <li><a href="home-page.html">Home</a></li>
                <li><a href="schedule.html">Schedule</a></li>
                <li><a href="lineup.html">Lineup</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="content-section">
        <!-- Contact -->
            <div class="contents">
                <h3>Contact</h3>
            </div>
            <h4>Send us an email</h4>
            <form id="contact-form" action="/submit-page" method="post">
                <p>
                    <label for="email"></label>
                    <input type="email" id="email" placeholder="email" required>
                </p>
                <p>
                    <label for="name"></label>
                    <input type="text" id="name" placeholder="name" required>
                </p>
                <p>
                    <label for="message"></label>
                    <textarea name="message" placeholder="type message" ></textarea>
                </p>
                <button class="secondary-btn" type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <div>
            <nav aria-label="Social media links">
                <div class="social-link-container">
                    <a href="https://www.facebook.com/" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                    <a href="https://www.instagram.com/?hl=en" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://x.com/" target="_blank"><i class="fa-brands fa-twitter"></i></a>
                </div>
            </nav>
        </div>
    </footer>
</body>
</html>
