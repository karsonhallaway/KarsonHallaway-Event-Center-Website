<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/8d9931e63d.js" crossorigin="anonymous"></script>
    <title>schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <!-- Navbar -->
        <nav>
            <a href="home-page.html" class="logo display">YS</a>
            <ul>
                <li><a href="home-page.html">Home</a></li>
                <li><a href="schedule.html" style="color: #00FF84;">Schedule</a></li>
                <li><a href="lineup.html">Lineup</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Schedule Section -->
        <section class="schedule">
            <h3>Schedule</h3>
            <div class="filter-container">
                <div class="icon-container">
                    <button class="icon-btn"><i class="fa-solid fa-filter"></i></button>
                </div>
                <div class="filter-tags">
                    <button class="tag">Artist</button>
                    <button class="tag">Stage</button>
                    <button class="tag">Day</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th scope="col">Artist</th>
                        <th scope="col">Stage</th>
                        <th scope="col">Time</th>
                        <th scope="col">Day</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="row-select">
                        <td>Nova Waves</td>
                        <td>Main Stage</td>
                        <td>6:00 PM</td>
                        <td>Friday</td>
                    </tr>
                    <tr class="row-select">
                        <td>The Relic Band</td>
                        <td>East Pavilion</td>
                        <td>7:30 PM</td>
                        <td>Friday</td>
                    </tr>
                    <tr class="row-select">
                        <td>DJ Solstice</td>
                        <td>Neon Tent</td>
                        <td>9:00 PM</td>
                        <td>Friday</td>
                    </tr>
                    <tr class="row-select">
                        <td>Ember & Oak</td>
                        <td>Main Stage</td>
                        <td>5:00 PM</td>
                        <td>Saturday</td>
                    </tr>
                    <tr class="row-select">
                        <td>Midnight Chorus</td>
                        <td>East Pavilion</td>
                        <td>8:00 PM</td>
                        <td>Saturday</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <div>
            <nav aria-label="Social media links">
                <div class="social-link-container">
                    <a href="https://www.facebook.com/" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                    <a href="https://www.instagram.com/?hl=en" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://x.com/" target="_blank"><i class="fa-brands fa-twitter"></i></a>
                </div>
            </nav>
        </div>
    </footer>    
</body>
</html>
